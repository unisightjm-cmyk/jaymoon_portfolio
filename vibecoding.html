<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet Archive — Vibe Coding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #16110d;
    --paper: #e6dfd3;
    --text:  #2A241D;
    --sub:   rgba(42,36,29,0.55);
    --gold:  #C9A86C;
    --gold2: #a8864e;
    --serif: 'Crimson Text', 'Nanum Myeongjo', serif;
    --sans:  'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at 50% 0%, #241b12 0%, #16110d 70%);
    color: var(--paper);
    font-family: var(--serif);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 48px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .back-btn {
    color: var(--gold); text-decoration: none;
    font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0.75; transition: opacity .2s;
  }
  .back-btn:hover { opacity: 1; }
  .page-label {
    font-family: var(--sans); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); opacity: 0.6;
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    align-items: stretch;
    height: calc(100vh - 74px);
  }

  /* ── Left: Laptop stage ── */
  .stage {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 60px 40px;
    position: relative;
    overflow: hidden;
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(201,168,108,0.06) 0%, transparent 65%);
    pointer-events: none;
  }

  /* ── 3D Laptop ── */
  .scene {
    perspective: 2000px;
    width: 600px; height: 500px;
    display: flex; justify-content: center; align-items: center;
    position: relative;
  }
  .laptop-wrap {
    position: relative;
    width: 440px; height: 300px;
    transform-style: preserve-3d;
    transform: rotateX(-20deg) rotateY(-15deg);
    transition: transform 0.5s ease;
    animation: drift 8s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: rotateX(-20deg) rotateY(-18deg) translateY(0); }
    100% { transform: rotateX(-15deg) rotateY(-10deg) translateY(-15px); }
  }

  /* Keyboard base (Floor) */
  .base {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 300px;
    background: linear-gradient(180deg, #4a4a50 0%, #2e2e33 100%);
    border-radius: 8px;
    transform-origin: top center;
    transform: rotateX(80deg);
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    transform-style: preserve-3d;
    pointer-events: none;
  }
  /* Keyboard keys */
  .base::before {
    content: '';
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 80px;
    background-image: 
      repeating-linear-gradient(90deg, transparent 0 18px, rgba(0,0,0,0.4) 18px 22px),
      repeating-linear-gradient(0deg, transparent 0 18px, rgba(0,0,0,0.4) 18px 22px);
    background-size: 22px 22px;
    opacity: 0.7;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 4px;
  }
  /* Trackpad */
  .base::after {
    content: '';
    position: absolute;
    bottom: 15px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 60px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* Screen lid (Wall) */
  .lid {
    position: absolute;
    bottom: 50%; left: 0; right: 0;
    height: 300px;
    background: #232326;
    border-radius: 12px 12px 0 0;
    border: 3px solid #505056;
    transform-origin: bottom center;
    transform: rotateX(-90deg); /* Closed state */
    transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    box-shadow: inset 0 0 0 10px #111;
    z-index: 5;
  }
  .laptop-wrap.open .lid {
    transform: rotateX(10deg);
  }

  /* Screen inner */
  .screen-inner {
    position: absolute; inset: 12px;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    cursor: zoom-in; /* Set cursor directly on container to cover entire screen area */
  }
  .screen-inner img {
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
    opacity: 0;
    transition: opacity .8s ease;
    pointer-events: none; /* Let clicks pass to container, or keep active on self */
  }
  .screen-inner img.loaded { opacity: 1; }
  .screen-placeholder {
    color: rgba(255,255,255,0.15);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    pointer-events: none;
  }

  /* Lid back (Apple logo side) */
  .lid-back {
    position: absolute; inset: -3px;
    backface-visibility: hidden;
    background: linear-gradient(160deg, #4a4a50 0%, #2a2a2e 100%);
    border-radius: 12px 12px 0 0;
    transform: rotateY(180deg);
    display: flex; align-items: center; justify-content: center;
  }
  .lid-back::after {
    content: '●'; color: rgba(255,255,255,0.1); font-size: 24px;
  }

  /* Ground shadow */
  .shadow {
    position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 40px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 75%);
    filter: blur(10px);
    z-index: -1;
  }
  @keyframes shadowDrift {
    0%   { transform: translateY(0) scaleX(1); opacity: .5; }
    100% { transform: translateY(4px) scaleX(0.85); opacity: .3; }
  }

  /* Nav dots */
  .laptop-nav {
    display: flex; gap: 10px; margin-top: 32px;
    align-items: center;
  }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .nav-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    transform: scale(1.2);
  }
  .laptop-nav button {
    background: transparent;
    border: 1px solid rgba(201,168,108,0.3);
    color: var(--gold); cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 13px; line-height: 1;
    transition: background .2s, border-color .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .laptop-nav button:hover:not(:disabled) {
    background: rgba(201,168,108,0.15);
    border-color: var(--gold);
  }
  .laptop-nav button:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ── Right: Content panel ── */
  .content-panel {
    width: 420px;
    background: var(--paper);
    color: var(--text);
    padding: 64px 52px;
    display: flex; flex-direction: column;
    position: relative;
    overflow-y: auto;
    box-shadow: -20px 0 60px rgba(0,0,0,0.4);
  }
  .content-panel::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, var(--gold2), var(--gold), var(--gold2));
  }

  .post-eyebrow {
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold2); margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .post-eyebrow::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(42,36,29,0.15);
  }
  .post-title {
    font-size: 28px; font-weight: normal;
    line-height: 1.25; margin-bottom: 20px;
    color: #1a1a1a;
    font-family: var(--serif);
  }
  .post-meta {
    font-family: var(--sans); font-size: 11px;
    color: var(--sub); margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .post-meta .dot { opacity: 0.4; }
  .post-meta .rel { color: var(--gold2); }
  .post-body {
    font-size: 16px; line-height: 1.85;
    color: #333; flex: 1;
  }
  .post-body p { margin-bottom: 1.4em; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; opacity: 0.4;
    font-style: italic; font-size: 18px;
  }

  .counter {
    margin-top: auto; padding-top: 28px;
    border-top: 1px solid rgba(42,36,29,0.12);
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 0.15em; color: var(--sub);
    text-transform: uppercase;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 9000;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; opacity: 0; transition: opacity .3s;
  }
  .lightbox.show { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 100%; max-height: 80vh;
    object-fit: contain; border-radius: 4px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  }
  .lb-ctrl {
    margin-top: 24px; display: flex; gap: 16px;
  }
  .lb-btn {
    background: transparent;
    border: 1px solid rgba(201,168,108,0.4);
    color: var(--gold); padding: 10px 22px;
    border-radius: 3px; font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; cursor: pointer;
    text-decoration: none; transition: background .2s;
  }
  .lb-btn:hover { background: rgba(201,168,108,0.12); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .content-panel { width: 100%; box-shadow: 0 -20px 40px rgba(0,0,0,0.3); }
    .stage { padding: 48px 20px 32px; }
    .laptop-wrap { transform: scale(0.78) rotateX(8deg) rotateY(-6deg); animation: none; }
    .topbar { padding: 18px 24px; }
  }
  @media (max-width: 500px) {
    .laptop-wrap { transform: scale(0.6) rotateX(8deg) rotateY(0); }
  }
</style>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="back-btn">← 돌아가기</a>
  <span class="page-label">Vibe Coding Creations</span>
</header>

<div class="main">

  <!-- Left: Laptop 3D stage -->
  <div class="stage">
    <div class="scene">
      <div class="laptop-wrap" id="laptopWrap">
        <!-- Screen lid -->
        <div class="lid" id="lid">
          <div class="screen-inner" id="postPhoto">
            <div class="screen-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
              </svg>
              <span>No Image</span>
            </div>
          </div>
        </div>
        <!-- Keyboard base -->
        <div class="base"></div>
      </div>
    </div>

    <!-- Shadow -->
    <div class="shadow"></div>

    <!-- Navigation -->
    <div class="laptop-nav">
      <button id="prevBtn" title="이전">‹</button>
      <div id="dotContainer" style="display:flex;gap:8px;"></div>
      <button id="nextBtn" title="다음">›</button>
    </div>
  </div>

  <!-- Right: Content -->
  <div class="content-panel">
    <div id="postContent" style="display:flex;flex-direction:column;flex:1;">
      <div class="empty-state">아직 등록된 산출물이 없습니다.</div>
    </div>
    <div class="counter" id="counter"></div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lbImg" src="" alt="">
  <div class="lb-ctrl">
    <a id="lbDownload" href="#" download="capture.png" class="lb-btn">다운로드</a>
    <button id="lbClose" class="lb-btn">닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script>
  let posts = [];
  let idx = 0;
  let isOpen = false;

  /* ── Laptop open/close ── */
  function openLid() {
    document.getElementById('laptopWrap').classList.add('open');
    isOpen = true;
  }
  function closeLid(cb) {
    document.getElementById('laptopWrap').classList.remove('open');
    isOpen = false;
    setTimeout(cb, 600);
  }

  /* ── Load posts ── */
  async function loadPosts() {
    // 1. Local first (instant)
    try {
      const saved = localStorage.getItem('ui.archive.vibes');
      if (saved) {
        posts = JSON.parse(saved);
        if (posts.length) {
          posts.sort((a, b) => new Date(b.date) - new Date(a.date));
          renderPost(true);
        }
      }
    } catch(e) {}

    // 2. Supabase (background)
    try {
      const remote = await UI_ARCHIVE.loadItemAsync('ui.archive.vibes', []);
      if (remote && remote.length) {
        posts = remote;
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderPost(true);
      }
    } catch(e) { console.error(e); }
  }

  /* ── Render ── */
  function renderPost(isInitial) {
    buildDots();

    if (posts.length === 0) {
      document.getElementById('postContent').innerHTML = '<div class="empty-state">아직 등록된 산출물이 없습니다.</div>';
      document.getElementById('counter').textContent = '';
      document.getElementById('prevBtn').disabled = true;
      document.getElementById('nextBtn').disabled = true;
      updateScreen(null);
      openLid();
      return;
    }

    const post = posts[idx];

    if (isInitial) {
      updateContent(post);
      updateScreen(post.image);
      openLid();
    } else {
      // Close lid → swap → reopen
      closeLid(() => {
        updateContent(post);
        updateScreen(post.image);
        openLid();
      });
    }
  }

  function updateScreen(imgSrc) {
    const el = document.getElementById('postPhoto');
    if (imgSrc) {
      el.innerHTML = `<img src="${imgSrc}" alt="screenshot"
        onload="this.classList.add('loaded')">`;
      el.onclick = () => showLightbox(imgSrc);
      el.style.cursor = 'zoom-in';
    } else {
      el.innerHTML = `<div class="screen-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        <span>No Image</span>
      </div>`;
      el.onclick = null;
      el.style.cursor = 'default';
    }
  }

  function updateContent(post) {
    const lang = UI_ARCHIVE.getLang();
    const d = new Date(post.date);
    const dateStr = isNaN(d) ? '' : d.toLocaleDateString(lang === 'ko' ? 'ko-KR' : 'en-US', { year:'numeric', month:'long', day:'numeric' });
    let rel = '';
    if (!isNaN(d)) {
      const diff = Math.floor((Date.now() - d) / 86400000);
      if (lang === 'ko') {
        if (diff >= 365) rel = Math.floor(diff/365) + '년 전';
        else if (diff >= 30) rel = Math.floor(diff/30) + '개월 전';
        else if (diff > 0)  rel = diff + '일 전';
        else rel = '오늘';
      } else {
        if (diff >= 365) rel = Math.floor(diff/365) + 'y ago';
        else if (diff >= 30) rel = Math.floor(diff/30) + 'm ago';
        else if (diff > 0)  rel = diff + 'd ago';
        else rel = 'Today';
      }
    }

    const title = (post.title?.[lang] || (lang === 'ko' ? post.title : '')) || 'Untitled';
    const body = (post.body?.[lang] || (lang === 'ko' ? post.body : '')) || '';

    const bodyHtml = body
      .split(/\n\n+/)
      .map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`)
      .join('');

    document.getElementById('postContent').innerHTML = `
      <div class="post-eyebrow">Vibe Coding</div>
      <h1 class="post-title">${title}</h1>
      <div class="post-meta">
        <span>${dateStr}</span>
        <span class="dot"></span>
        <span style="color:var(--gold)">${rel}</span>
      </div>
      <div class="post-body">${bodyHtml}</div>
    `;

    document.getElementById('counter').textContent =
      `${String(idx+1).padStart(2,'0')} / ${String(posts.length).padStart(2,'0')}`;
    document.getElementById('prevBtn').disabled = (idx === 0);
    document.getElementById('nextBtn').disabled = (idx === posts.length - 1);
  }

  function buildDots() {
    const c = document.getElementById('dotContainer');
    c.innerHTML = '';
    posts.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'nav-dot' + (i === idx ? ' active' : '');
      d.style.cssText = 'background:none;border:1px solid rgba(255,255,255,0.25);width:8px;height:8px;border-radius:50%;cursor:pointer;padding:0;transition:background .2s,transform .2s;';
      if (i === idx) { d.style.background = 'var(--gold)'; d.style.borderColor = 'var(--gold)'; d.style.transform = 'scale(1.25)'; }
      d.addEventListener('click', () => { if (i !== idx) { idx = i; renderPost(false); } });
      c.appendChild(d);
    });
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (idx > 0) { idx--; renderPost(false); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (idx < posts.length - 1) { idx++; renderPost(false); }
  });

  /* ── Lightbox ── */
  function showLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lbImg').src = src;
    document.getElementById('lbDownload').href = src;
    lb.style.display = 'flex';
    requestAnimationFrame(() => lb.classList.add('show'));
  }
  function hideLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('show');
    setTimeout(() => lb.style.display = 'none', 300);
  }
  document.getElementById('lbClose').addEventListener('click', hideLightbox);
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target.id === 'lightbox') hideLightbox(); });

  window.showLightbox = showLightbox;

  /* ── Boot ── */
  setTimeout(loadPosts, 200);
</script>
</body>
</html>
