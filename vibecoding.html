<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet Archive — Vibe Coding</title>
<style>
  :root {
    --bg: #1c1512;
    --text: #2A241D;
    --sub: rgba(42,36,29,0.6);
    --gold: #C9A86C;
    --serif: "Crimson Text", "KoPub Batang", "Nanum Myeongjo", serif;
    --sans: "Inter", "Pretendard", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 40px 20px;
    background: radial-gradient(circle at 50% 30%, #2c2218 0%, #16110d 100%);
    color: #e6dfd3;
    font-family: var(--serif);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }
  
  .header {
    width: 100%; max-width: 1100px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 60px;
  }
  .back-btn {
    color: var(--gold); text-decoration: none; font-family: var(--sans);
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; opacity: 0.8; transition: opacity 0.3s;
  }
  .back-btn:hover { opacity: 1; }

  /* Layout */
  .vibe-container {
    width: 100%; max-width: 1100px;
    display: flex; gap: 60px; align-items: center;
  }
  .vibe-left {
    flex: 1.2;
    display: flex; justify-content: center; align-items: center;
    perspective: 2000px;
  }
  .vibe-right {
    flex: 1;
    display: flex; flex-direction: column;
    background: #e6dfd3; color: var(--text);
    padding: 50px; border-radius: 6px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  /* 3D Laptop */
  .laptop {
    width: 500px; height: 320px;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(20deg) rotateY(-15deg) rotateZ(5deg);
    animation: floatLaptop 6s ease-in-out infinite alternate;
  }
  @keyframes floatLaptop {
    0% { transform: rotateX(20deg) rotateY(-15deg) rotateZ(5deg) translateY(0); }
    100% { transform: rotateX(22deg) rotateY(-12deg) rotateZ(4deg) translateY(-10px); }
  }

  .laptop-base {
    position: absolute; bottom: 0; left: 0; right: 0; height: 16px;
    background: linear-gradient(to right, #9A9286 0%, #6B6354 100%);
    border-radius: 4px 4px 10px 10px;
    transform: rotateX(90deg) translateZ(-152px);
    transform-origin: bottom;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    display: flex; flex-direction: column; align-items: center;
  }
  .keyboard {
    width: 80%; height: 160px; background: #333; margin-top: 10px; border-radius: 4px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  .trackpad {
    width: 30%; height: 50px; background: #555; margin-top: 10px; border-radius: 4px;
  }

  .laptop-lid {
    position: absolute; bottom: 0; left: 0; right: 0; height: 320px;
    background: linear-gradient(135deg, #2c2f33 0%, #1a1a1c 100%);
    border-radius: 12px 12px 0 0;
    transform-origin: bottom;
    transform: rotateX(-90deg); /* Closed */
    transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    border: 2px solid #555; border-bottom: none;
    box-shadow: inset 0 0 0 4px #000;
    display: flex; justify-content: center; align-items: center; padding: 12px;
  }
  .laptop.open .laptop-lid {
    transform: rotateX(-5deg); /* Opened */
  }

  .laptop-screen {
    width: 100%; height: 100%; background: #000; border-radius: 2px;
    overflow: hidden; position: relative;
    cursor: zoom-in;
  }
  .laptop-screen img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.5s; opacity: 0;
  }
  .laptop-screen img.loaded { opacity: 1; }

  /* Text Content */
  .post-date {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.15em;
    color: var(--sub); text-transform: uppercase; margin-bottom: 16px;
    display: block;
  }
  .post-title {
    font-size: 26px; font-weight: normal; margin: 0 0 24px 0;
    line-height: 1.3; color: #1a1a1a;
  }
  .post-body {
    font-size: 15px; line-height: 1.8; color: #333;
    white-space: pre-wrap; flex: 1;
  }
  .post-body p { margin-top: 0; margin-bottom: 1.5em; }

  /* Nav */
  .post-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.1);
  }
  .post-nav button {
    background: transparent; border: none; font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.1em; color: var(--sub);
    cursor: pointer; transition: color 0.2s; text-transform: uppercase;
  }
  .post-nav button:hover:not(:disabled) { color: var(--text); }
  .post-nav button:disabled { opacity: 0.3; cursor: not-allowed; }

  .empty-state {
    text-align: center; color: var(--sub); font-style: italic;
    margin-top: 100px;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9); z-index: 9999;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; opacity: 0; transition: opacity 0.3s;
  }
  .lightbox.show { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 100%; max-height: 80vh; object-fit: contain;
    border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .lightbox-controls {
    margin-top: 20px; display: flex; gap: 20px;
  }
  .lightbox-btn {
    background: transparent; border: 1px solid var(--gold); color: var(--gold);
    padding: 10px 20px; border-radius: 4px; font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .lightbox-btn:hover { background: var(--gold); color: #1a1a1a; }

  @media(max-width: 900px) {
    .vibe-container { flex-direction: column; gap: 40px; }
    .vibe-left { width: 100%; }
    .laptop { transform: scale(0.7) rotateX(20deg) rotateY(0deg) rotateZ(0deg); animation: none; }
    .vibe-right { width: 100%; padding: 30px 20px; }
  }
  @media(max-width: 500px) {
    .laptop { transform: scale(0.6) rotateX(20deg) rotateY(0deg) rotateZ(0deg); }
  }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← 돌아가기 / Back</a>
  <div style="font-size: 14px; color: var(--gold); font-style: italic;">Vibe Coding Creations</div>
</div>

<div class="vibe-container" id="vibeContainer">
  <div class="vibe-left">
    <div class="laptop" id="laptop">
      <div class="laptop-base">
        <div class="keyboard"></div>
        <div class="trackpad"></div>
      </div>
      <div class="laptop-lid">
        <div class="laptop-screen" id="postPhoto">
          <div style="color:rgba(255,255,255,0.3); font-family:var(--sans); font-size:12px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">No Image</div>
        </div>
      </div>
    </div>
  </div>
  <div class="vibe-right">
    <div id="postContent">
      <!-- Content injected here -->
    </div>
    <div class="post-nav">
      <button id="prevBtn">← Previous</button>
      <span id="pageIndicator" style="font-family:var(--sans); font-size:10px; color:var(--sub);"></span>
      <button id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="Full size image" />
  <div class="lightbox-controls">
    <a href="#" id="lightboxDownload" download="vibecoding_image.png" class="lightbox-btn">사진 다운로드</a>
    <button id="lightboxClose" class="lightbox-btn">닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script>
  let posts = [];
  let currentIndex = 0;

  async function loadPosts() {
    // 1. Local
    try {
      const saved = localStorage.getItem('ui.archive.vibes');
      if(saved) {
        posts = JSON.parse(saved);
        if(posts && posts.length > 0) posts.sort((a,b) => new Date(b.date) - new Date(a.date));
      }
    } catch(e) {}
    renderPost();

    // 2. Supabase
    try {
      const remotePosts = await UI_ARCHIVE.loadItemAsync('ui.archive.vibes', []);
      if(remotePosts && remotePosts.length > 0) {
        posts = remotePosts;
        posts.sort((a,b) => new Date(b.date) - new Date(a.date));
        renderPost();
      }
    } catch(e) { console.error(e); }
  }

  function renderPost() {
    const contentEl = document.getElementById('postContent');
    const photoEl = document.getElementById('postPhoto');
    const laptop = document.getElementById('laptop');
    
    // Close laptop lid before changing
    laptop.classList.remove('open');
    
    setTimeout(() => {
      if(posts.length === 0) {
        photoEl.innerHTML = '<div style="color:rgba(255,255,255,0.3); font-family:var(--sans); font-size:12px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">빈 페이지</div>';
        contentEl.innerHTML = '<div class="empty-state">아직 등록된 산출물이 없습니다.</div>';
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('pageIndicator').textContent = '0 / 0';
        laptop.classList.add('open');
        return;
      }

      const post = posts[currentIndex];
      
      if(post.image) {
        photoEl.innerHTML = `<img src="${post.image}" alt="Vibe Coding visual" onload="this.classList.add('loaded')" onclick="openLightbox('${post.image}')" />`;
      } else {
        photoEl.innerHTML = '<div style="color:rgba(255,255,255,0.3); font-family:var(--sans); font-size:12px; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">No Image</div>';
      }
      
      const d = new Date(post.date);
      const dateStr = isNaN(d.getTime()) ? '' : d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
      
      let relativeStr = '';
      if(!isNaN(d.getTime())) {
        const now = new Date();
        const diffMs = now - d;
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const diffMonths = Math.floor(diffDays / 30);
        const diffYears = Math.floor(diffDays / 365);
        if (diffYears > 0) relativeStr = `${diffYears}년 전`;
        else if (diffMonths > 0) relativeStr = `${diffMonths}개월 전`;
        else if (diffDays > 0) relativeStr = `${diffDays}일 전`;
        else relativeStr = `오늘`;
      }

      contentEl.innerHTML = `
        <span class="post-date">${dateStr} <span style="color:var(--gold); margin-left:8px; text-transform:none;">${relativeStr}</span></span>
        <h1 class="post-title">${post.title || 'Untitled'}</h1>
        <div class="post-body">${post.body ? post.body.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('') : ''}</div>
      `;

      document.getElementById('prevBtn').disabled = (currentIndex === 0);
      document.getElementById('nextBtn').disabled = (currentIndex === posts.length - 1);
      document.getElementById('pageIndicator').textContent = `${currentIndex + 1} / ${posts.length}`;
      
      // Open laptop lid
      laptop.classList.add('open');
    }, 400); // Wait for lid to close
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if(currentIndex > 0) { currentIndex--; renderPost(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if(currentIndex < posts.length - 1) { currentIndex++; renderPost(); }
  });

  // Lightbox
  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxDownload').href = src;
    lb.style.display = 'flex';
    setTimeout(() => lb.classList.add('show'), 10);
  }
  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('show');
    setTimeout(() => lb.style.display = 'none', 300);
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if(e.target.id === 'lightbox') closeLightbox();
  });

  window.addEventListener('DOMContentLoaded', () => {
    // start slightly closed, then open
    setTimeout(loadPosts, 300);
  });
</script>

</body>
</html>
