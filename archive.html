<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet Archive — Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1c1512;
    --paper:     #F0E9DD;
    --paper-mid: #DDD4C3;
    --paper-dark:#C8BCA9;
    --text:      #231E18;
    --text-mid:  #4A4037;
    --sub:       rgba(70,58,48,0.55);
    --gold:      #C9A86C;
    --gold-dim:  rgba(201,168,108,0.15);
    --serif:     'Crimson Text', 'Nanum Myeongjo', serif;
    --sans:      'Inter', 'Pretendard', sans-serif;
    --radius:    6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at 50% 0%, #2c2218 0%, #16110d 70%);
    color: var(--text);
    font-family: var(--serif);
    min-height: 100vh;
    padding: 32px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .header {
    width: 100%; max-width: 960px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .back-btn {
    color: var(--gold); text-decoration: none; font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; opacity: 0.75;
    transition: opacity 0.2s;
  }
  .back-btn:hover { opacity: 1; }
  .header-label {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--gold); opacity: 0.55;
    font-weight: 500;
  }

  /* ── Book container ── */
  .book-container {
    width: 100%; max-width: 960px;
    position: relative;
  }

  /* ── Top navigator bar (above book) ── */
  .book-topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .book-topbar .nav-group {
    display: flex; align-items: center; gap: 10px;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid rgba(201,168,108,0.4);
    color: var(--gold);
    padding: 7px 18px;
    border-radius: 20px;
    font-family: var(--sans);
    font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover:not(:disabled) {
    background: rgba(201,168,108,0.12);
    border-color: var(--gold);
  }
  .nav-btn:disabled {
    opacity: 0.22; cursor: not-allowed;
  }

  /* Post index badge */
  .post-index {
    font-family: var(--sans);
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 8px;
  }
  .post-index .current-num {
    font-size: 20px; font-weight: 600;
    color: var(--gold); line-height: 1;
  }
  .post-index .sep { opacity: 0.3; }
  .post-index .total-num {
    font-size: 13px; color: rgba(255,255,255,0.35);
  }
  .post-index .index-label {
    font-size: 10px; letter-spacing: 0.15em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-left: 4px;
  }

  /* ── Book ── */
  .book {
    display: flex;
    width: 100%;
    background: #110d0a;
    padding: 10px;
    border-radius: 10px;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.85),
      0 10px 30px rgba(0,0,0,0.5),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    animation: openBook 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes openBook {
    0%   { transform: rotateX(20deg) translateY(30px) scale(0.96); opacity: 0; }
    100% { transform: rotateX(3deg)  translateY(0)    scale(1);    opacity: 1; }
  }

  /* ── Pages ── */
  .page {
    flex: 1;
    min-height: 680px;
    position: relative;
  }
  .page.left {
    background: linear-gradient(
      to right,
      var(--paper-dark) 0%,
      var(--paper-mid)  3%,
      var(--paper)      6%,
      var(--paper)     100%
    );
    border-radius: 4px 0 0 4px;
    border-right: 1px solid rgba(0,0,0,0.12);
    padding: 44px 40px 36px;
    display: flex; flex-direction: column;
  }
  .page.right {
    background: linear-gradient(
      to left,
      var(--paper-dark) 0%,
      var(--paper-mid)  3%,
      var(--paper)      6%,
      var(--paper)     100%
    );
    border-radius: 0 4px 4px 0;
    border-left: 1px solid rgba(255,255,255,0.35);
    padding: 52px 56px 44px;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  /* Spine shadow lines */
  .page.left::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0; width: 18px;
    background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
    pointer-events: none;
  }

  /* ── Photo side (left page) ── */
  .page-number-stamp {
    font-family: var(--sans); font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--sub);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .page-number-stamp::after {
    content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.1);
  }

  .photo-frame {
    width: 100%; flex: 1;
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow:
      inset 0 2px 12px rgba(0,0,0,0.06),
      0 2px 8px rgba(0,0,0,0.08);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .photo-frame img {
    width: 100%; height: 100%; object-fit: contain;
    filter: sepia(0.15) contrast(0.92) brightness(0.97);
    cursor: zoom-in; transition: filter 0.3s;
  }
  .photo-frame img:hover { filter: sepia(0.05) contrast(1) brightness(1); }

  .no-image-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: var(--sub); font-family: var(--sans); font-size: 12px;
    letter-spacing: 0.1em; opacity: 0.5;
  }
  .no-image-placeholder svg { opacity: 0.3; }

  .photo-caption {
    margin-top: 14px;
    font-family: var(--sans); font-size: 11px;
    color: var(--sub); text-align: center;
    letter-spacing: 0.08em; line-height: 1.5;
    font-style: italic;
  }

  /* ── Text side (right page) ── */
  .post-meta-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px;
  }
  .post-date {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.16em;
    color: var(--sub); text-transform: uppercase;
  }
  .post-rel {
    font-family: var(--sans); font-size: 11px;
    color: var(--gold); opacity: 0.75;
  }

  /* Decorative rule */
  .meta-rule {
    height: 1px;
    background: linear-gradient(to right, var(--gold), rgba(201,168,108,0.15), transparent);
    margin: 12px 0 24px;
    opacity: 0.5;
  }

  .post-title {
    font-family: var(--serif);
    font-size: 30px; font-weight: 600;
    line-height: 1.25; color: var(--text);
    margin-bottom: 24px;
    letter-spacing: -0.01em;
  }
  .post-body {
    font-family: var(--serif);
    font-size: 17px; line-height: 1.85;
    color: var(--text-mid);
    flex: 1;
  }
  .post-body p {
    margin-bottom: 1.4em;
  }

  /* right page bottom: post number watermark */
  .page-foot {
    margin-top: auto; padding-top: 24px;
    display: flex; justify-content: flex-end; align-items: center;
    border-top: 1px solid rgba(0,0,0,0.06);
    font-family: var(--sans); font-size: 10px;
    letter-spacing: 0.18em; color: var(--sub);
    text-transform: uppercase;
  }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--sub); font-style: italic;
    font-size: 18px; opacity: 0.7;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94); z-index: 9999;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; opacity: 0; transition: opacity 0.3s;
  }
  .lightbox.show { display: flex; opacity: 1; }
  .lightbox img {
    max-width: 100%; max-height: 80vh; object-fit: contain;
    border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .lightbox-controls { margin-top: 20px; display: flex; gap: 16px; }
  .lightbox-btn {
    background: transparent; border: 1px solid rgba(201,168,108,0.4);
    color: var(--gold); padding: 10px 22px; border-radius: 4px;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; cursor: pointer; text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .lightbox-btn:hover { background: var(--gold); color: #1a1a1a; }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    body { padding: 24px 14px 48px; }
    .book { flex-direction: column; }
    .page.left { min-height: 300px; border-radius: 4px 4px 0 0; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 28px 22px; }
    .page.right { min-height: auto; border-radius: 0 0 4px 4px; border-left: none; padding: 32px 22px; }
    .post-title { font-size: 24px; }
    .post-body { font-size: 16px; }
    .book-topbar { flex-wrap: wrap; gap: 10px; }
    .post-index { order: -1; width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← 돌아가기 / Back</a>
  <span class="header-label">Insights Archive</span>
</div>

<div class="book-container">

  <!-- ── Top navigation bar ── -->
  <div class="book-topbar">
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn">&#8592; <span id="prevLabel">이전</span></button>
    </div>

    <!-- Post index badge -->
    <div class="post-index" id="postIndex">
      <span class="current-num" id="currentNum">—</span>
      <span class="sep">/</span>
      <span class="total-num" id="totalNum">—</span>
      <span class="index-label" id="indexLabel">Insight</span>
    </div>

    <div class="nav-group">
      <button class="nav-btn" id="nextBtn"><span id="nextLabel">다음</span> &#8594;</button>
    </div>
  </div>

  <!-- ── Book ── -->
  <div class="book">
    <div class="page left">
      <div class="page-number-stamp" id="pageStamp">— —</div>
      <div class="photo-frame" id="postPhoto">
        <div class="no-image-placeholder">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>No Image</span>
        </div>
      </div>
      <div class="photo-caption" id="postCaption"></div>
    </div>

    <div class="page right" id="rightPage">
      <div id="postContent">
        <!-- injected -->
      </div>
    </div>
  </div>

</div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="Full size image" />
  <div class="lightbox-controls">
    <a href="#" id="lightboxDownload" download="insight_image.png" class="lightbox-btn">사진 다운로드</a>
    <button id="lightboxClose" class="lightbox-btn">닫기</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script>
  let posts = [];
  let currentIndex = 0;

  async function loadPosts() {
    try {
      const saved = localStorage.getItem('ui.archive.posts');
      if (saved) {
        posts = JSON.parse(saved);
        if (posts && posts.length > 0) posts.sort((a, b) => new Date(b.date) - new Date(a.date));
      }
    } catch(e) {}
    renderPost();

    try {
      const remotePosts = await UI_ARCHIVE.loadItemAsync('ui.archive.posts', []);
      if (remotePosts && remotePosts.length > 0) {
        posts = remotePosts;
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderPost();
      }
    } catch(e) { console.error(e); }
  }

  function renderPost() {
    const contentEl  = document.getElementById('postContent');
    const photoEl    = document.getElementById('postPhoto');
    const captionEl  = document.getElementById('postCaption');
    const lang       = UI_ARCHIVE.getLang();

    const isKo = lang === 'ko';

    // Update html lang
    document.documentElement.lang = lang;

    if (posts.length === 0) {
      photoEl.innerHTML = `<div class="no-image-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>${isKo ? '빈 페이지' : 'Empty'}</span></div>`;
      captionEl.textContent = '';
      contentEl.innerHTML = `<div class="empty-state">${isKo ? '아직 작성된 인사이트가 없습니다.' : 'No insights have been written yet.'}</div>`;
      document.getElementById('prevBtn').disabled = true;
      document.getElementById('nextBtn').disabled = true;
      document.getElementById('currentNum').textContent = '0';
      document.getElementById('totalNum').textContent = '0';
      document.getElementById('pageStamp').textContent = '— —';
      return;
    }

    const post  = posts[currentIndex];
    const total = posts.length;
    const num   = currentIndex + 1; // display number (1-based, newest = 1)

    // ── Photo ──
    if (post.image) {
      photoEl.innerHTML = `<img src="${post.image}" alt="Insight visual" onclick="openLightbox('${post.image}')" />`;
    } else {
      photoEl.innerHTML = `<div class="no-image-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>${isKo ? '여백' : 'No Image'}</span></div>`;
    }

    // ── Caption ──
    captionEl.textContent = (post.caption?.[lang] || (isKo ? post.caption : '')) || '';

    // ── Date ──
    const d = new Date(post.date);
    const dateStr = isNaN(d.getTime()) ? '' : d.toLocaleDateString(isKo ? 'ko-KR' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' });

    // ── Relative time ──
    let relStr = '';
    if (!isNaN(d.getTime())) {
      const diffDays   = Math.floor((Date.now() - d) / 86400000);
      const diffMonths = Math.floor(diffDays / 30);
      const diffYears  = Math.floor(diffDays / 365);
      if (isKo) {
        if (diffYears  > 0) relStr = `${diffYears}년 전`;
        else if (diffMonths > 0) relStr = `${diffMonths}개월 전`;
        else if (diffDays   > 0) relStr = `${diffDays}일 전`;
        else relStr = '오늘';
      } else {
        if (diffYears  > 0) relStr = `${diffYears}y ago`;
        else if (diffMonths > 0) relStr = `${diffMonths}mo ago`;
        else if (diffDays   > 0) relStr = `${diffDays}d ago`;
        else relStr = 'Today';
      }
    }

    // ── Title & Body ──
    const title = (post.title?.[lang] || (isKo ? post.title : '')) || (isKo ? '제목 없음' : 'Untitled');
    const body  = (post.body?.[lang]  || (isKo ? post.body  : '')) || '';

    // ── Left page stamp ──
    document.getElementById('pageStamp').textContent =
      isKo ? `${total - currentIndex}번째 인사이트` : `Insight No. ${num}`;

    // ── Index badge ──
    document.getElementById('currentNum').textContent = String(num).padStart(2, '0');
    document.getElementById('totalNum').textContent   = String(total).padStart(2, '0');
    document.getElementById('indexLabel').textContent  = isKo ? '번째 글' : ' of total';

    // ── Right page content ──
    contentEl.innerHTML = `
      <div class="post-meta-row">
        <span class="post-date">${dateStr}</span>
        <span class="post-rel">${relStr}</span>
      </div>
      <div class="meta-rule"></div>
      <h1 class="post-title">${title}</h1>
      <div class="post-body">${body ? body.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('') : ''}</div>
      <div class="page-foot">${isKo ? `전체 ${total}편 중 ${num}번째` : `${num} of ${total} insights`}</div>
    `;

    // ── Nav buttons ──
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    prevBtn.disabled = (currentIndex === 0);
    nextBtn.disabled = (currentIndex === posts.length - 1);
    document.getElementById('prevLabel').textContent = isKo ? '이전 글' : 'Previous';
    document.getElementById('nextLabel').textContent = isKo ? '다음 글' : 'Next';

    // Scroll right page to top on navigation
    document.getElementById('rightPage').scrollTop = 0;
  }

  document.getElementById('prevBtn').addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderPost(); }
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (currentIndex < posts.length - 1) { currentIndex++; renderPost(); }
  });

  // ── Lightbox ──
  function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxDownload').href = src;
    lb.style.display = 'flex';
    setTimeout(() => lb.classList.add('show'), 10);
  }
  function closeLightbox() {
    const lb = document.getElementById('lightbox');
    lb.classList.remove('show');
    setTimeout(() => lb.style.display = 'none', 300);
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target.id === 'lightbox') closeLightbox();
  });

  window.addEventListener('DOMContentLoaded', loadPosts);
</script>

</body>
</html>
